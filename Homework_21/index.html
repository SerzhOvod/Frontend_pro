<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <h1>ToDoList</h1>
      <form class="form js--form">
        <input
          type="text"
          name="value"
          required
          class="form__input js--form__input"
        />
        <button class="form__btn" type="submit">Додати</button>
      </form>
      <ul class="js--todos-wrapper">
        <li class="todo-item">
          <input type="checkbox" />
          <span class="todo-item__description">Text</span>
          <button class="todo-item__delete">Видалити</button>
        </li>
        <li class="todo-item">
          <input type="checkbox" />
          <span class="todo-item__description">Text</span>
          <button class="todo-item__delete">Видалити</button>
        </li>
      </ul>
    </div>

    <div
      class="modal fade"
      id="taskModal"
      tabindex="-1"
      aria-labelledby="taskModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content p-3 border-0 shadow-lg"
          style="border-radius: 6px; color: #000"
        >
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-normal fs-4" id="taskModalLabel">
              Ваше завдання
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body py-4">
            <p id="modalTaskText" class="text-secondary fs-5 text-break m-0">
              Текст завдання
            </p>
          </div>

          <div class="modal-footer border-0 pt-0 justify-content-end">
            <button
              type="button"
              class="btn btn-secondary px-4 py-2"
              data-bs-dismiss="modal"
              style="
                background-color: #6c757d;
                border: none;
                border-radius: 4px;
              "
            >
              Закрити
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="src/homework_21_1.js"></script>
  </body>
</html>
